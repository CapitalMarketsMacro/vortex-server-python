<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Vortex Admin — {% block title %}{% endblock %}</title>
<style>
  body { font-family: system-ui, -apple-system, Segoe UI, sans-serif; max-width: 960px; margin: 2rem auto; padding: 0 1rem; color: #222; }
  nav { border-bottom: 1px solid #ddd; padding-bottom: .5rem; margin-bottom: 1.5rem; }
  nav a { margin-right: 1rem; text-decoration: none; color: #0066cc; font-weight: 500; }
  nav a:hover { text-decoration: underline; }
  h1 { margin-top: 0; }
  table { border-collapse: collapse; width: 100%; margin-bottom: 1rem; }
  th, td { text-align: left; padding: .5rem .75rem; border-bottom: 1px solid #eee; }
  th { background: #f5f5f5; font-weight: 600; }
  .btn { display: inline-block; padding: .4rem .8rem; border: 1px solid #ccc; background: #f9f9f9; border-radius: 4px; text-decoration: none; color: #222; cursor: pointer; font-size: .9rem; }
  .btn-primary { background: #0066cc; color: white; border-color: #0066cc; }
  .btn-danger { background: #cc3333; color: white; border-color: #cc3333; }
  .btn:hover { opacity: .85; }
  form.inline { display: inline; }
  label { display: block; margin-top: 1rem; font-weight: 500; }
  input[type=text], input[type=password], input[type=number], select, textarea {
    width: 100%; padding: .5rem; font-size: 1rem; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;
    font-family: inherit;
  }
  textarea { font-family: ui-monospace, Consolas, monospace; }
  .flash { padding: .75rem 1rem; margin-bottom: 1rem; border-radius: 4px; }
  .flash.success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
  .flash.error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
  .muted { color: #888; font-size: .85rem; }
  .fieldset { border: 1px solid #ddd; padding: 1rem; border-radius: 4px; margin-top: 1rem; }
  .fieldset legend { font-weight: 600; padding: 0 .5rem; }
  .hidden { display: none; }
  code { background: #f5f5f5; padding: .1rem .3rem; border-radius: 3px; font-size: .9em; }
</style>
</head>
<body>

<nav>
  <a href="{{ url_for('index') }}">Dashboard</a>
  <a href="{{ url_for('transports_list') }}">Transports</a>
  <a href="{{ url_for('tables_list') }}">Tables</a>
</nav>

{% with messages = get_flashed_messages(with_categories=true) %}
  {% for category, msg in messages %}
    <div class="flash {{ category }}">{{ msg }}</div>
  {% endfor %}
{% endwith %}

{% block content %}{% endblock %}

</body>
</html>
